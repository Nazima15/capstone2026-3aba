name: CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: 소스코드 체크아웃
        uses: actions/checkout@v4

      # 1. 자바 21 설정 (프로젝트 버전에 맞춤)
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # 2. 백엔드 빌드
      - name: Build Backend with Maven
        run: |
          cd backend
          chmod +x mvnw
          ./mvnw clean package -DskipTests

      # 3. Docker Hub 로그인
      - name: Docker Hub 로그인
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 4. 백엔드 이미지 빌드 및 푸시
      - name: Backend Docker Build & Push
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/yj-backend:latest ./backend
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/yj-backend:latest

      # 5. 프런트엔드 이미지 빌드 및 푸시
      - name: Frontend Docker Build & Push
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/yj-frontend:latest ./frontend
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/yj-frontend:latest