name: CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: 소스코드 체크아웃
        uses: actions/checkout@v4

      # --- 백엔드 준비 ---
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Backend
        run: |
          cd backend
          chmod +x mvnw
          ./mvnw clean package -DskipTests

      # --- Docker Hub 로그인 ---
      - name: Docker Hub 로그인
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # --- 이미지 빌드 및 푸시 ---
      - name: Backend Build & Push
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/yj-backend:latest ./backend
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/yj-backend:latest

      - name: Frontend Build & Push
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/yj-frontend:latest ./frontend
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/yj-frontend:latestDOCKERHUB_USERNAME }}/yj-frontend:latest