name: CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  docker-build:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4

      # ✅ Secrets 제대로 들어왔는지 확인 (디버그)
      - name: DEBUG SECRET
        run: |
          echo "USER=${{ secrets.DOCKER_USERNAME }}"
          echo "PASS=${{ secrets.DOCKER_PASSWORD }}"

      # ✅ Docker 로그인 (직접 방식 - 확실한 테스트)
      - name: DockerHub 로그인
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # ✅ 백엔드 이미지 빌드
      - name: 백엔드 이미지 빌드
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/backend:latest ./backend

      # ✅ 프론트 이미지 빌드
      - name: 프론트 이미지 빌드
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/frontend:latest ./frontend

      # ✅ DockerHub 업로드 (backend)
      - name: DockerHub 업로드 (backend)
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/backend:latest

      # ✅ DockerHub 업로드 (frontend)
      - name: DockerHub 업로드 (frontend)
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/frontend:latest