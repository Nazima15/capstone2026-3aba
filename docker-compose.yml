services:
  db:
    image: mariadb:latest
    container_name: yj-db
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: "1234"
      MARIADB_DATABASE: user_db
    ports:
      - "3316:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: your-dockerhub-id/yj-backend:latest  # 본인 ID로 수정
    container_name: yj-backend
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: your-dockerhub-id/yj-frontend:latest # 본인 ID로 수정
    container_name: yj-frontend
    ports:
      - "63342:80"
    depends_on:
      - backend